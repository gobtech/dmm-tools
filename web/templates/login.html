<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — DMM Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400..800&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #f2f0ec;
  --bg-card: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #a0a0a0;
  --accent: #c43030;
  --border: rgba(0,0,0,.08);
  --border-strong: rgba(0,0,0,.12);
  --radius: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 0 0 1px rgba(0,0,0,.03), 0 4px 12px rgba(0,0,0,.05), 0 16px 40px rgba(0,0,0,.04);
  --font-body: 'Raleway', sans-serif;
  --font-heading: 'EB Garamond', serif;
  --logo-filter: none;
}
html.dark {
  --bg-base: #0e0e10;
  --bg-card: #18181b;
  --text-primary: #fafafa;
  --text-secondary: #a1a1aa;
  --text-tertiary: #52525b;
  --accent: #c43030;
  --border: rgba(255,255,255,.08);
  --border-strong: rgba(255,255,255,.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.4);
  --logo-filter: brightness(0) invert(1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.login-card .logo {
  height: 28px;
  opacity: .7;
  margin-bottom: 16px;
  filter: var(--logo-filter);
}
.login-card h1 {
  font-family: var(--font-heading);
  font-size: 32px;
  font-weight: 400;
  margin-bottom: 4px;
}
.login-card .subtitle {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 28px;
}
.login-card label {
  display: block;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.login-card input[type="text"],
.login-card input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 10px;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.login-card input:focus {
  outline: none;
  border-color: var(--accent);
}
.login-card .btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
  margin-top: 4px;
}
.login-card .btn:hover { opacity: .9; }
.error-msg {
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: left;
}
html.dark .error-msg {
  background: rgba(185,28,28,.15);
  color: #fca5a5;
  border-color: rgba(185,28,28,.3);
}
</style>
</head>
<body>
<div class="login-card">
  <img class="logo" src="https://images.squarespace-cdn.com/content/v1/590102829de4bb02e43309fd/1503502770341-VCOKSUOU944GCVSODOI7/DMM-final-logo-extended.png" alt="DMM">
  <h1>DMM Tools</h1>
  <p class="subtitle">Sign in to continue</p>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password">
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
<script>
(function() {
  const theme = localStorage.getItem('dmm_theme');
  if (theme === 'dark') document.documentElement.classList.add('dark');
})();
</script>
</body>
</html>
